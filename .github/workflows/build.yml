name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="ScreenAlert"
          APP_DIR="build/${APP_NAME}.app"

          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp ".build/release/${APP_NAME}" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          cp "Resources/Info.plist" "${APP_DIR}/Contents/"
          echo -n "APPL????" > "${APP_DIR}/Contents/PkgInfo"

          codesign --force --sign - \
            --entitlements "ScreenAlert.entitlements" \
            "${APP_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenAlert.app
          path: build/ScreenAlert.app
          if-no-files-found: error

      - name: Zip app bundle for release
        if: github.event_name == 'release'
        run: cd build && zip -r ScreenAlert.zip ScreenAlert.app

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/ScreenAlert.zip --clobber
