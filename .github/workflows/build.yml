name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import Certificate
        env:
          SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        if: env.SIGNING_CERTIFICATE_P12_DATA != ''
        run: |
          echo "::group::Decoding certificate..."
          echo $SIGNING_CERTIFICATE_P12_DATA | base64 --decode > certificate.p12
          echo "Certificate decoded ($(wc -c < certificate.p12) bytes)"

          echo "::group::Creating build keychain..."
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "Keychain created and unlocked"

          echo "::group::Importing certificate..."
          security import certificate.p12 -k build.keychain -P "$SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          echo "Certificate imported"

          echo "::group::Verifying signing identity..."
          security find-identity -v -p codesigning build.keychain
          echo "::endgroup::"

      - name: Build release
        run: |
          echo "Building ScreenAlert (release)..."
          swift build -c release
          echo "Build complete: $(ls -lh .build/release/ScreenAlert | awk '{print $5}')"

      - name: Create app bundle
        run: |
          APP_NAME="ScreenAlert"
          APP_DIR="build/${APP_NAME}.app"
          SPARKLE_FRAMEWORK=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework"

          echo "::group::Creating bundle structure..."
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"
          mkdir -p "${APP_DIR}/Contents/Frameworks"

          cp ".build/release/${APP_NAME}" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          cp -a "$SPARKLE_FRAMEWORK" "${APP_DIR}/Contents/Frameworks/"
          cp "Resources/Info.plist" "${APP_DIR}/Contents/"
          echo -n "APPL????" > "${APP_DIR}/Contents/PkgInfo"
          echo "Bundle structure created"
          echo "::endgroup::"

          echo "::group::Injecting version..."
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}" # Remove 'v' prefix
          else
            VERSION="0.0.0-dev"
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "Version: ${VERSION} (Build ${BUILD_NUMBER})"
          plutil -replace CFBundleShortVersionString -string "$VERSION" "${APP_DIR}/Contents/Info.plist"
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" "${APP_DIR}/Contents/Info.plist"
          echo "::endgroup::"

          echo "::group::Code signing..."
          if security find-certificate -c "ScreenAlert App Signing" >/dev/null 2>&1; then
            echo "Signing with certificate identity 'ScreenAlert App Signing'..."
            codesign --force --sign "ScreenAlert App Signing" --options runtime \
              "${APP_DIR}/Contents/Frameworks/Sparkle.framework"
            echo "Sparkle.framework signed"
            codesign --force --sign "ScreenAlert App Signing" --options runtime \
              --entitlements "ScreenAlert.entitlements" \
              "${APP_DIR}"
            echo "App bundle signed"
          else
            echo "WARNING: Certificate not found, falling back to ad-hoc signing"
            codesign --force --sign - \
              "${APP_DIR}/Contents/Frameworks/Sparkle.framework"
            codesign --force --sign - \
              --entitlements "ScreenAlert.entitlements" \
              "${APP_DIR}"
          fi
          echo "::endgroup::"

          echo "::group::Verifying signature..."
          codesign -dvvv "${APP_DIR}" 2>&1 || true
          echo "::endgroup::"

      - name: Create Zip Archive (ditto)
        run: |
          echo "Creating zip archive..."
          cd build
          ditto -c -k --sequesterRsrc --keepParent ScreenAlert.app ScreenAlert.zip
          echo "Archive created: $(ls -lh ScreenAlert.zip | awk '{print $5}')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenAlert.app
          path: build/ScreenAlert.app
          if-no-files-found: error

      - name: Generate Sparkle Appcast & Sign Update
        if: github.event_name == 'release'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/"

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set, cannot generate appcast"
            exit 1
          fi

          echo "::group::Preparing updates directory..."
          mkdir -p updates
          cp build/ScreenAlert.zip updates/
          echo "Copied ScreenAlert.zip to updates/ ($(ls -lh updates/ScreenAlert.zip | awk '{print $5}'))"
          echo "::endgroup::"

          echo "::group::Fetching previous appcast from latest release..."
          LATEST_APPCAST_URL="https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml"
          if curl -fsSL -o updates/appcast.xml "$LATEST_APPCAST_URL" 2>/dev/null; then
            echo "Downloaded existing appcast.xml from previous release"
            cat updates/appcast.xml
          else
            echo "No previous appcast found, will create a new one"
          fi
          echo "::endgroup::"

          echo "::group::Generating appcast with EdDSA signature..."
          echo "Download URL prefix: ${DOWNLOAD_URL}"
          echo "$SPARKLE_PRIVATE_KEY" | .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL" \
            updates/
          echo "Appcast generated successfully"
          echo "::endgroup::"

          echo "::group::Final appcast.xml content..."
          cat updates/appcast.xml
          echo "::endgroup::"

          cp updates/appcast.xml ./

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Uploading assets to release ${TAG}..."
          gh release upload "$TAG" build/ScreenAlert.zip --clobber
          echo "Uploaded ScreenAlert.zip"
          gh release upload "$TAG" appcast.xml --clobber
          echo "Uploaded appcast.xml"
          echo "Release assets:"
          gh release view "$TAG" --json assets --jq '.assets[].name'
